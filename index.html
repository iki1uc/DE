<script>
async function loadFiles() {
  const res = await fetch("files.json");
  const data = await res.json();

  const files = data.files;

  // GEN‑Zuweisung
  const genMap = files.map((f, i) => {
    if (i < 27) return {file:f, gen:"4u"};
    if (i < 54) return {file:f, gen:"WHY"};
    return {file:f, gen:"onu"};
  });

  console.log("GEN‑Mapping:", genMap);
}
loadFiles();
</script>
