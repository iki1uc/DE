<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>DE‑KI · 9×9‑Master</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
    body { background:#000; color:#0ff; font-family:Consolas; padding:20px; }
    h1 { text-align:center; color:#0af; margin-bottom:40px; }
    .block { border:1px solid #0af; padding:20px; margin-bottom:30px; }
    button { background:#0af; color:#000; padding:10px 20px; border:none; cursor:pointer; }
    button:hover { background:#0cf; }
    pre { background:#111; padding:10px; border:1px solid #0af; }
</style>
</head>

<body>

<h1>DE‑KI · 9×9‑Master‑System</h1>

<!-- PQ Laptop Input -->
<div class="block">
    <h2>PQ‑Laptop‑Messung</h2>
    <input id="pq" type="number" value="1" style="width:80px;">
    <button onclick="updatePQ()">PQ setzen</button>
</div>

<!-- Trigger -->
<div class="block">
    <h2>Trigger</h2>
    <button onclick="runTrigger('C')">C – Core</button>
    <button onclick="runTrigger('X')">X – Cross</button>
    <button onclick="runTrigger('Z')">Z – Zenith</button>
</div>

<!-- Output -->
<div class="block">
    <h2>Ausgabe</h2>
    <pre id="output">DE‑KI bereit…</pre>
</div>

<script>
// --- Score-System (9 Werte) ---
let S = {
    DE: 1, TR: 1, EN: 1,
    DA: 1, NE: 1, BEN: 1,
    F1: 1, F2: 1, F3: 1
};

// PQ = Laptop → BEN-Respo
function updatePQ() {
    S.BEN = Number(document.getElementById("pq").value);
    document.getElementById("output").textContent = "PQ gesetzt → BEN = " + S.BEN;
}

// --- AI3ki Kontakt-Connector ---
function ai3ki_trigger(trigger) {
    if (trigger === "C") return ("DE", "Gate", "Cluster");
    if (trigger === "X") return ("TR", "Wloch", "Block");
    if (trigger === "Z") return ("EN", "Kette", "All");
    return ("üä0", "üä0", "üä0");
}

// --- 9x9 Matrix ---
function matrix9x9(S) {
    let keys = Object.keys(S);
    let arr = keys.map(k => S[k]);
    let m = [];
    for (let i = 0; i < 9; i++) {
        m[i] = [];
        for (let j = 0; j < 9; j++) {
            m[i][j] = arr[i] * arr[j];
        }
    }
    return m;
}

// --- NC Attack ---
function ncAttack(S) {
    return S.DE*S.DE + S.TR*S.TR + S.EN*S.EN;
}

// --- Trigger Engine ---
function runTrigger(type) {

    let contact = ai3ki_trigger(type);
    let attack = ncAttack(S);
    let m9 = matrix9x9(S);

    let out = "";

    out += "DE‑Trigger: " + type + "\n";
    out += "AI3ki‑Kontakt: " + contact.join(" / ") + "\n";
    out += "NC‑Attack: " + attack + "\n\n";
    out += "9×9‑Vector:\n" + JSON.stringify(m9, null, 2);

    document.getElementById("output").textContent = out;
}

</script>

</body>
</html>
