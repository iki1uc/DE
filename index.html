<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>GEN‑Matrix</title>

<style>
body {
  background:#000;
  color:#0f0;
  font-family:Consolas;
  margin:0;
  overflow:hidden;
}

.ultra81 {
  position:absolute;
  top:20px;
  left:20px;
  display:grid;
  grid-template-columns:repeat(9,1fr);
  gap:4px;
  width:360px;
}

.cell {
  background:#001100;
  border:1px solid #003300;
  padding:10px;
  text-align:center;
  cursor:pointer;
  transition:0.2s;
}

.cell:hover {
  background:#00ff00;
  color:#000;
  transform:scale(1.1);
}

.cell[data-gen="4u"] { color:#00ff00; }
.cell[data-gen="WHY"] { color:#00ccff; }
.cell[data-gen="onu"] { color:#ff0066; }
</style>
</head>

<body>

<div class="ultra81"></div>

<script>
/* NEUTRALER KERNEL-ROUTER */
function loadKernel(gen){
  if(gen === "4u") window.location.href = "DA.html";
  if(gen === "WHY") window.location.href = "NE.html";
  if(gen === "onu") window.location.href = "BEN.html";
}

/* Matrix erzeugen (neutral, ohne Technik) */
const matrixHTML = Array.from({length:81}, (_,i)=>{
  const gen = i < 27 ? "4u" : i < 54 ? "WHY" : "onu";
  return `<div class="cell" data-gen="${gen}">${gen}</div>`;
}).join("");

document.querySelector(".ultra81").innerHTML = matrixHTML;

/* Klicks → Kernel laden */
document.querySelectorAll(".cell").forEach(cell=>{
  cell.addEventListener("click", ()=>{
    loadKernel(cell.dataset.gen);
  });
});
</script>

</body>
</html>
