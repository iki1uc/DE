<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>DE – Struktur‑Matrix 9×9</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
    body {
        background: #0d0d0d;
        color: #e6e6e6;
        font-family: Arial, sans-serif;
        padding: 40px;
    }
    h1 {
        text-align: center;
        color: #7df;
        margin-bottom: 30px;
        font-size: 2.2em;
    }
    #matrix {
        display: grid;
        grid-template-columns: repeat(9, 50px);
        grid-gap: 8px;
        justify-content: center;
        margin-top: 40px;
    }
    .cell {
        width: 50px;
        height: 50px;
        background: #1a1a1a;
        border: 1px solid #333;
        text-align: center;
        line-height: 50px;
        cursor: pointer;
        transition: 0.2s;
        font-size: 1.1em;
    }
    .cell:hover {
        background: #7df;
        color: #000;
        transform: scale(1.1);
    }
    #output {
        margin-top: 40px;
        padding: 20px;
        background: #1a1a1a;
        border: 1px solid #333;
        border-radius: 6px;
    }
    h2 {
        color: #7df;
    }
</style>

</head>
<body>

<h1>DE – Struktur‑Engine (9×9)</h1>

<!-- DE lädt eigene Module -->
<script src="DE.room"></script>
<script src="X.room.IN"></script>
<script src="X.room.CORE"></script>
<script src="X.room.OUT"></script>
<script src="tmp.room"></script>
<script src="tmp-Matrix"></script>
<script src="6E → 6D.tech"></script>
<script src="DATA"></script>

<div id="matrix"></div>

<div id="output">
    <h2>DE‑Struktur‑Output</h2>
    <p id="result">Wähle ein Feld aus der 9×9‑Matrix.</p>
</div>

<script>
// DE – Struktur Engine
const matrix = document.getElementById("matrix");
const result = document.getElementById("result");

// 9×9 tmp‑Matrix erzeugen
for (let i = 1; i <= 81; i++) {
    let cell = document.createElement("div");
    cell.className = "cell";
    cell.textContent = i;
    cell.onclick = () => DE_calc(i);
    matrix.appendChild(cell);
}

// DE‑Calc‑Modus (Struktur, kein Root)
function DE_calc(n) {

    // Struktur‑Score (DE‑eigener DATA‑Layer)
    let score = Math.floor(Math.random() * 600);

    // DE‑Achsen
    let achse = "Achse-" + (n % 6);

    // DE‑Bereich
    let bereich = "Bereich-" + (n % 8);

    // DE‑Epoche / Dimension
    let epoche = "DE‑6E-" + (n % 6);
    let dimension = "DE‑6D-" + (n % 6);

    // Ausgabe
    result.innerHTML = `
        <strong>DE‑Struktur:</strong> Feld ${n}<br>
        <strong>Score:</strong> ${score}<br>
        <strong>Achse:</strong> ${achse}<br>
        <strong>Bereich:</strong> ${bereich}<br>
        <strong>Epoche:</strong> ${epoche}<br>
        <strong>Dimension:</strong> ${dimension}<br>
        <strong>Weiterleitung:</strong> Struktur an TR bereit
    `;
}
</script>

</body>
</html>
