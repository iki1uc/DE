<!DOCTYPE html>
<html lang="DE">
<head>
  <meta charset="UTF-8">
  <title>DE Portal – WELT System</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- DE Startsprache -->
  <script>
    window.WELT_CURRENT_LANGUAGE = "DE";
  </script>
</head>

<body>

  <!-- Sprachsystem -->
  <div id="language-index">
    <button data-lang="DE">Deutsch</button>
    <button data-lang="TR">Türkçe</button>
    <button data-lang="EN">English</button>

    <!-- frei wählbare Slots -->
    <button data-lang="DA">du</button>
    <button data-lang="NE">er</button>
    <button data-lang="BEN">ich</button>
  </div>

  <!-- Hauptanzeige -->
  <div id="portal-screen"></div>

  <!-- Sprachumschalter -->
  <script>
    function WELT_language_switch(lang) {
      window.WELT_CURRENT_LANGUAGE = lang;
      console.log("Sprache gewechselt zu:", lang);
      loadLanguageRoom(lang);
    }

    document.querySelectorAll('#language-index button').forEach(btn => {
      btn.addEventListener('click', () => {
        const lang = btn.getAttribute('data-lang');
        WELT_language_switch(lang);
      });
    });
  </script>

  <!-- DE + WELT + EDEN + HI + PORT Loader -->
  <script>
    function loadLanguageRoom(lang) {
      let file = "";

      switch(lang) {
        case "DE": file = "DE.room"; break;
        case "TR": file = "TR.room"; break;
        case "EN": file = "EN.room"; break;

        case "DA": file = "DA.html"; break;
        case "NE": file = "NE.html"; break;
        case "BEN": file = "BEN.html"; break;
      }

      document.getElementById("portal-screen").innerText =
        "Lade: " + file + " … (DE + WELT + EDEN aktiv)";
    }

    // Start in DE
    loadLanguageRoom("DE");
  </script>

</body>
</html>
