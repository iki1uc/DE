<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>DE‑KI · Trigger‑System</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
    body { background:#000; color:#0ff; font-family:Consolas; padding:20px; }
    h1 { text-align:center; color:#0af; margin-bottom:40px; }
    .block { border:1px solid #0af; padding:20px; margin-bottom:30px; }
    button { background:#0af; color:#000; padding:10px 20px; border:none; cursor:pointer; }
    button:hover { background:#0cf; }
    pre { background:#111; padding:10px; border:1px solid #0af; }
</style>
</head>

<body>

<h1>DE‑KI · Trigger‑System</h1>

<div class="block">
    <h2>PQ‑Laptop</h2>
    <p>PQ wird bei jedem ENTER automatisch getriggert.</p>
    <input id="pq" type="number" value="1" style="width:80px;">
</div>

<div class="block">
    <h2>Trigger</h2>
    <button onclick="runTrigger('C')">C – Core</button>
    <button onclick="runTrigger('X')">X – Cross</button>
    <button onclick="runTrigger('Z')">Z – Zenith</button>
</div>

<div class="block">
    <h2>Ausgabe</h2>
    <pre id="output">Bereit…</pre>
</div>

<script>
function getPQ() {
    return Number(document.getElementById("pq").value);
}

function runTrigger(type) {

    let PQ = getPQ(); // PQ wird automatisch abgefragt

    let out = "";
    out += "Trigger: " + type + "\n";
    out += "PQ (Laptop): " + PQ + "\n";

    // Pipeline‑4 Vorbereitung
    let pipeline = {
        A: [PQ, 1, 2],
        B: [0, 1, 2],
        Pair: [
            [PQ, 0],
            [1, 1],
            [2, 2]
        ]
    };

    out += "\nPipeline‑4:\n" + JSON.stringify(pipeline, null, 2);

    document.getElementById("output").textContent = out;
}
</script>

</body>
</html>
